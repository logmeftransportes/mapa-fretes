<!DOCTYPE html>
<html>
  <head>
    <title>LogMEF - Mapa de Fretes</title>
    <style>
      #map { height: 100vh; width: 100%; }
      body { margin: 0; font-family: sans-serif; }
    </style>
  </head>
  <body>
    <div id="map"></div>

    <script>
      // 1. CONFIGURAÇÕES
      const API_KEY = 'AIzaSyAfxWHsTHYmQQTnuvQrpNouqnQJ7Suv9BY'; 
      const SPREADSHEET_ID = '1l864xm1rG_frLbkfAZGSBfJWpVF9B5TcgBfgSUFadlg';
      
      // SUBSTITUA PELO NOME REAL DA ABA (Ex: 'Folha1', 'Cidades', 'Fretes')
      const ABAS_PARA_CARREGAR = ['3']; 

      async function initMap() {
        // Importar bibliotecas necessárias (Nova norma da Google)
        const { Map } = await google.maps.importLibrary("maps");
        const { AdvancedMarkerElement } = await google.maps.importLibrary("marker");

        const map = new Map(document.getElementById("map"), {
          zoom: 5,
          center: { lat: -15.78, lng: -47.92 },
          mapId: "DEMO_MAP_ID", // Necessário para Advanced Markers
        });

        const infowindow = new google.maps.InfoWindow();

        ABAS_PARA_CARREGAR.forEach(aba => {
          carregarDados(map, aba, infowindow, AdvancedMarkerElement);
        });
      }

      function carregarDados(map, abaNome, infowindow, AdvancedMarkerElement) {
        const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${abaNome}?key=${API_KEY}`;

        fetch(url)
          .then(res => res.json())
          .then(data => {
            const rows = data.values;
            if (!rows || rows.length <= 1) return;

            for (let i = 1; i < rows.length; i++) {
              const linha = rows[i];
              const lat = parseFloat(linha[5]); // Coluna F
              const lng = parseFloat(linha[6]); // Coluna G
              const cidade = linha[1];          // Coluna B

              if (!isNaN(lat) && !isNaN(lng)) {
                const marker = new AdvancedMarkerElement({
                  map: map,
                  position: { lat: lat, lng: lng },
                  title: cidade,
                });

                marker.addListener("click", () => {
                  infowindow.setContent(`<strong>${cidade}</strong><br>Frete: ${linha[11]}`);
                  infowindow.open(map, marker);
                });
              }
            }
          })
          .catch(err => console.error("Erro ao carregar aba:", err));
      }
    </script>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAfxWHsTHYmQQTnuvQrpNouqnQJ7Suv9BY&callback=initMap&v=beta&libraries=marker" async defer></script>
  </body>
</html>

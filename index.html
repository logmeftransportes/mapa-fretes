<!DOCTYPE html>
<html>
  <head>
    <title>LogMEF - Mapa de Fretes por Categoria</title>
    <style>
      #map { height: 100vh; width: 100%; }
      body { margin: 0; font-family: 'Segoe UI', sans-serif; }
      /* Estilo da Legenda */
      #legend {
        background: white; padding: 10px; margin: 10px;
        border: 1px solid #ccc; border-radius: 5px; line-height: 1.5;
      }
      .legend-item { display: flex; align-items: center; gap: 8px; font-size: 14px; }
      .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
    </style>
  </head>
  <body>
    <div id="map"></div>
    
    <div id="legend">
      <strong>Categorias de Frete</strong>
      <div class="legend-item"><span class="dot" style="background: #4285F4;"></span> Aba 3</div>
      <div class="legend-item"><span class="dot" style="background: #FBBC04;"></span> Aba 5</div>
      <div class="legend-item"><span class="dot" style="background: #EA4335;"></span> Aba 7</div>
    </div>

    <script>
      const API_KEY = 'AIzaSyAfxWHsTHYmQQTnuvQrpNouqnQJ7Suv9BY'; 
      const SPREADSHEET_ID = '1l864xm1rG_frLbkfAZGSBfJWpVF9B5TcgBfgSUFadlg';

      // 1. DEFINIÇÃO DAS CORES POR ABA
      const CONFIG_ABAS = {
        '3': { cor: '#4285F4', nome: 'Frete Tipo 3' }, // Azul
        '5': { cor: '#FBBC04', nome: 'Frete Tipo 5' }, // Amarelo/Laranja
        '7': { cor: '#EA4335', nome: 'Frete Tipo 7' }  // Vermelho
      };

      (g=>{var h,a,k,p="The Google Maps JavaScript API",c="google",l="importLibrary",q="__ib__",m=document,b=window;b=b[c]||(b[c]={});var d=b.maps||(b.maps={}),r=new Set,e=new URLSearchParams,u=()=>h||(h=new Promise(async(f,n)=>{await a;m.head.append(k=m.createElement("script"));e.set("libraries",[...r]+"");for(k.src=`https://maps.${c}apis.com/maps/api/js?`+e;k.onerror=()=>n(Error(p+" could not load."));k.nonce=m.querySelector("script[nonce]")?.nonce||"";m.head.append(k);f()}));d[l]?console.warn(p+" only loads once. Re-referencing: ",d[l]):d[l]=(f,...n)=>r.add(f)&&u().then(()=>d[l](f,...n));a=new Promise(f=>setTimeout(f));k=m.createElement("script");e.set("key",API_KEY);e.set("callback",c+".maps."+q);b[c][q]=f=>a=f;u()})({});

      async function initMap() {
        const { Map } = await google.maps.importLibrary("maps");
        const { AdvancedMarkerElement, PinElement } = await google.maps.importLibrary("marker");

        const map = new Map(document.getElementById("map"), {
          zoom: 4,
          center: { lat: -15.78, lng: -47.92 },
          mapId: "DEMO_MAP_ID",
        });

        // Adiciona a legenda ao mapa
        map.controls[google.maps.ControlPosition.RIGHT_BOTTOM].push(document.getElementById("legend"));

        const infowindow = new google.maps.InfoWindow();

        // 2. CARREGAR CADA ABA COM A SUA COR
        Object.keys(CONFIG_ABAS).forEach(idAba => {
          carregarDados(map, idAba, infowindow, AdvancedMarkerElement, PinElement);
        });
      }
function carregarDados(map, abaNome, infowindow, AdvancedMarkerElement, PinElement) {
  // Pedimos um intervalo grande (A1:Z5000) para garantir que apanha tudo
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${abaNome}!A1:Z5000?key=${API_KEY}`;
  const corAba = CONFIG_ABAS[abaNome].cor;

  fetch(url)
    .then(res => res.json())
    .then(data => {
      if (!data.values) {
        console.warn("Aba " + abaNome + " vazia ou não encontrada.");
        return;
      }

      const rows = data.values;
      console.log(`Aba ${abaNome}: Lidas ${rows.length} linhas.`);

      for (let i = 1; i < rows.length; i++) {
        const linha = rows[i];
        
        // Limpeza dos dados: remove espaços e troca vírgula por ponto
        let rawLat = String(linha[5] || "").replace(',', '.').trim();
        let rawLng = String(linha[6] || "").replace(',', '.').trim();
        
        const lat = parseFloat(rawLat);
        const lng = parseFloat(rawLng);
        const cidade = linha[1] || "Cidade Desconhecida";

        // Só cria o marcador se os números forem válidos
        if (!isNaN(lat) && !isNaN(lng)) {
          const pin = new PinElement({
            background: corAba,
            borderColor: "#FFF",
            glyphColor: "#FFF",
          });

          const marker = new AdvancedMarkerElement({
            map: map,
            position: { lat: lat, lng: lng },
            title: cidade,
            content: pin.element,
          });

          marker.addListener("click", () => {
            infowindow.setContent(`<strong>${cidade}</strong><br>Frete: ${linha[11] || 'N/A'}`);
            infowindow.open(map, marker);
          });
        } else {
          // Log para sabermos qual linha está com problema
          console.log(`Linha ${i+1} da Aba ${abaNome} ignorada (Lat/Lng inválida):`, linha[5], linha[6]);
        }
      }
    })
    .catch(err => console.error("Erro na aba " + abaNome, err));
}

      window.onload = initMap;
    </script>
  </body>
</html>
